# ==================================================
# Mihomo 最强防泄漏配置
# 推荐客户端:Mihomo / Clash Verge Rev / FlClash / ClashMi
# 兼容 Stash / ClashX Pro(独有字段会被忽略)
# ==================================================

mixed-port: 7890
ipv6: true
allow-lan: true
unified-delay: false
tcp-concurrent: true
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
find-process-mode: strict
global-client-fingerprint: chrome

# GeoIP/GeoSite 自动更新
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"

profile:
  store-selected: true
  store-fake-ip: true

# --- 流量嗅探:解决 App 直接用 IP 绕过域名规则 ---
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# --- TUN 模式:劫持所有系统流量和 DNS ---
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# --- DNS 防泄漏配置 ---
dns:
  enable: true
  ipv6: true
  # 本地监听,配合 TUN 劫持所有查询
  listen: 0.0.0.0:1053
  # Fake-IP 模式,减少真实查询
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "localhost.ptlogin2.qq.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "+.market.xiaomi.com"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.xboxlive.com"
    - "stun.*.*.*"
    - "stun.*.*"
  # 启动引导:纯 IP 形式 DoT,首次查询就加密
  default-nameserver:
    - tls://223.5.5.5:853
    - tls://223.6.6.6:853
    - tls://1.12.12.12:853
  # 主 DNS:国内 DoH
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  # 境外 DoH 兜底,防 GFW 污染
  fallback:
    - https://1.1.1.1/dns-query
    - https://dns.google/dns-query
    - https://9.9.9.9/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/32
    domain:
      - "+.google.com"
      - "+.facebook.com"
      - "+.youtube.com"
      - "+.github.com"
      - "+.twitter.com"
      - "+.telegram.org"
  # 代理节点域名专用解析器(Mihomo 独有)
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
  # DNS 查询也走路由规则,防运营商审计(Mihomo 独有)
  respect-rules: true

proxies: ~
proxy-groups: ~
rules: ~
