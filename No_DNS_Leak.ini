[custom]
; ==================================================
; 极简白名单订阅转换规则 (Mihomo / Stash 通用)
; 策略: 白名单模式 - 默认代理，命中白名单的才直连
; 直连: 中国大陆 + Apple + Microsoft + 私有网络
; 防护: fake-ip + DoH，防止 DNS 泄漏
; ==================================================

; ==================================================
; 策略组定义
; ==================================================
custom_proxy_group=🚀 节点选择`select`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连

; ==================================================
; 规则集定义 (顺序即优先级)
; ==================================================

; ---------- 1. 私有网络直连 ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.list

; ---------- 2. 白名单直连: Apple + Microsoft ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Apple/Apple.list
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Microsoft/Microsoft.list

; ---------- 3. 白名单直连: 中国域名 (top 500 覆盖) ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMax/ChinaMax.list
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/ChinaMedia/ChinaMedia.list

; ---------- 4. 国内 IP 兜底 (no-resolve 防 DNS 泄漏) ----------
ruleset=🎯 全球直连,[]IP-ASN,4134,no-resolve
ruleset=🎯 全球直连,[]IP-ASN,4837,no-resolve
ruleset=🎯 全球直连,[]IP-ASN,9808,no-resolve
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

; ---------- 5. 兜底: 其余境外流量全部代理 ----------
ruleset=🐟 漏网之鱼,[]MATCH

; ==================================================
; 覆写开关
; ==================================================
enable_rule_generator=true
overwrite_original_rules=true
