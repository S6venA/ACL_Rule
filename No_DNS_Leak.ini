[custom]
; 使用自定义 mihomo base 文件，向最终配置注入 tun/dns/sniffer 等字段

enable_rule_generator=true
overwrite_original_rules=true
clash_rule_base=https://raw.githubusercontent.com/S6venA/ACL_Rule/main/mihomo_base.yml

; ==================================================
; 策略组定义
; ==================================================
; 🚀 节点选择
custom_proxy_group=🚀 节点选择`select`.*
; 🎯 全球直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
; 🛑 全局拦截
custom_proxy_group=🛑 全局拦截`select`[]REJECT`[]DIRECT
; 🐟 漏网之鱼
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连

; ==================================================
; 规则集定义 (Ruleset)
; ==================================================
; 广告拦截
ruleset=🛑 全局拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全局拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 国内直连
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

; 兜底规则
ruleset=🐟 漏网之鱼,[]MATCH
