[custom]
; ==================================================
; 1. 基础配置设定
; ==================================================
enable_rule_generator=true
overwrite_original_rules=true
add_emoji=true
remove_old_emoji=true

; ==================================================
; 2. 极简手动策略组
; ==================================================
; --- 全局核心策略 ---
; ".*" 代表无差别读取订阅链接中的所有有效节点
custom_proxy_group=🚀 节点选择`select`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🛑 全局拦截`select`[]REJECT`[]DIRECT

; --- 基础服务策略 ---
; 苹果和微软服务国内有CDN，默认选直连，备选代理
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 节点选择
; 漏网之鱼通常是不知名的海外网站，默认走代理，备选直连
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连

; ==================================================
; 3. 规则集定义 (保留防 DNS 泄漏逻辑)
; ==================================================
; 优先拦截广告与隐私跟踪
ruleset=🛑 全局拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全局拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 指定特殊海外服务 (直接指向 🚀 节点选择)
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Netflix.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/YouTube.list

; 微软与苹果服务
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

; 局域网与国内直连规则
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list

; 【防 DNS 泄露核心】：直接对国内 IP 应用直连，并加上 no-resolve
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

; 兜底规则：凡是没有被上面命中的国外常见网站，统一走代理
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

; 未匹配到的最终流量处理
custom_rule=MATCH,🐟 漏网之鱼
