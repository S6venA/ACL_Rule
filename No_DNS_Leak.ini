[custom]
; ==================================================
; 1. 基础配置设定
; ==================================================
enable_rule_generator=true
overwrite_original_rules=true
add_emoji=true
remove_old_emoji=true

; ==================================================
; 2. 节点过滤
; 集中过滤掉机场的流量、过期提示等无效节点
; ==================================================
exclude_remarks=(?i)(Data|Traffic|Expire|Reset|剩[余餘]流量|流量|到期|过期|失效|[时時][间間]|官网|网址|更新|获取|订阅|分割线|GB|MB)

; ==================================================
; 3. 极简手动策略组 (纯手动，无测速)
; ==================================================
; --- 全局核心策略 ---
; ".*" 代表匹配所有经过上述过滤后的有效节点
custom_proxy_group=🚀 节点选择`select`[]🎯 全球直连`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择
custom_proxy_group=🛑 全局拦截`select`[]REJECT`[]DIRECT

; --- 核心服务策略 (全部严格跟随 "🚀 节点选择") ---
custom_proxy_group=🤖 AI 服务`select`[]🚀 节点选择
custom_proxy_group=📱 电报消息`select`[]🚀 节点选择
custom_proxy_group=🎥 奈飞视频`select`[]🚀 节点选择
custom_proxy_group=🎬 油管视频`select`[]🚀 节点选择
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 节点选择
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 节点选择
custom_proxy_group=🌍 国外网站`select`[]🚀 节点选择
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]🎯 全球直连

; ==================================================
; 4. 规则集定义 (保留防 DNS 泄漏逻辑)
; ==================================================
; 优先拦截广告与隐私跟踪
ruleset=🛑 全局拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 全局拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list

; 指定特殊服务走对应策略
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/OpenAi.list
ruleset=🤖 AI 服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Claude.list
ruleset=📱 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🎥 奈飞视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Netflix.list
ruleset=🎬 油管视频,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/YouTube.list
ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=Ⓜ️ 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list

; 局域网与国内直连规则
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list

; 【防 DNS 泄露核心】：直接对国内 IP 应用直连，并加上 no-resolve
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve

; 兜底规则：凡是没有被上面命中的国外常见网站，统一走代理
ruleset=🌍 国外网站,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list
ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list

; 未匹配到的最终流量处理
custom_rule=MATCH,🐟 漏网之鱼