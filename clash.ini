[custom]
; ==================================================
; 极简白名单订阅转换规则 (Mihomo / Stash 通用)
; 策略: 白名单模式 - 默认代理,命中白名单的才直连
; ==================================================

; ==================================================
; 策略组定义
; ==================================================
custom_proxy_group=🚀 节点选择`select`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 节点选择

; ==================================================
; 规则集定义 (顺序即优先级)
; ==================================================

; ---------- 1. 私有网络直连 ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Lan/Lan.list

; ---------- 2. 白名单直连: Apple + Microsoft ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Apple/Apple.list
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Clash/Microsoft/Microsoft.list

; ---------- 3. 白名单直连: 国内域名 ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaMedia.list

; ---------- 4. 白名单直连: 国内 IP ----------
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaCompanyIp.list
ruleset=🎯 全球直连,https://cdn.jsdelivr.net/gh/ACL4SSR/ACL4SSR@master/Clash/ChinaIp.list

; ---------- 5. 兜底: 其余境外流量全部代理 ----------
ruleset=🚀 节点选择,[]MATCH

; ==================================================
; 覆写开关
; ==================================================
enable_rule_generator=true
overwrite_original_rules=true
