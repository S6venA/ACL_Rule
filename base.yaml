  # Apple
  - RULE-SET,Apple,🍎 苹果服务
  # 直连服务
  - RULE-SET,bilibili_domain,🎯 全球直连
  - RULE-SET,Netease,🎯 全球直连
  # 游戏
  - RULE-SET,category-games@cn,🎮 游戏平台
