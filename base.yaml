  - RULE-SET,google_domain,🚀 节点选择
  # Github & Cloudflare
  - RULE-SET,github_domain,🚀 节点选择
  - RULE-SET,Cloudflare,🚀 节点选择
  # 币圈
  - RULE-SET,Binance,🚀 节点选择
  - RULE-SET,Bybit,🚀 节点选择
  - RULE-SET,Gateio,🚀 节点选择
  - RULE-SET,Kucoin,🚀 节点选择
  - RULE-SET,Kraken,🚀 节点选择
