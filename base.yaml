  - RULE-SET,bahamut_domain,🚀 节点选择
  - RULE-SET,biliintl_domain,🚀 节点选择
  - RULE-SET,spotify_domain,🚀 节点选择
  - RULE-SET,pixiv_domain,🚀 节点选择
